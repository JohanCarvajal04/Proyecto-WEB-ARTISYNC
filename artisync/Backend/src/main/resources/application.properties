spring.application.name=artisync
# ==============================
# Base de Datos PostgreSQL
# ==============================
spring.datasource.url=jdbc:postgresql://localhost:5432/Artisync
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=1
# ==============================
# JWT
# ==============================
app.jwt.secret=MiClaveSecretaMuyLargaParaJWT1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz
app.jwt.expiration-ms=86400000

# ==============================
# Servidor
# ==============================
server.port=8080

# ==========================================
# CONFIGURACIÓN DE SPRINGDOC / SWAGGER / OPENAPI
# ==========================================
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/api/swagger-ui.html

