# ============================================================
# Configuración de pruebas — sobreescribe application.properties
# Usa H2 en memoria para no depender de PostgreSQL ni Docker
# ============================================================

# Base de datos en memoria H2 (no requiere Docker)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea y destruye el esquema automáticamente en cada test
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Deshabilitar Flyway en tests (H2 no necesita migraciones SQL de PostgreSQL)
spring.flyway.enabled=false

# Redis — apunta a localhost; el bean se crea (conexión perezosa, no falla al arrancar)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Correo — configuración falsa para que JavaMailSender bean se cree sin error
# (no intenta enviar correos durante tests)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT de prueba
